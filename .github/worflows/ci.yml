name: Owl Nest CI

on:
  push:
    branches: ["**"]

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Lint & Format
        run: npm run lint 
      - name: Type-check
        run: npm run type-check
      - name: Build React App
        run: npm run build

  docker-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (Check)
        run: docker build . -t owl-nest-test
